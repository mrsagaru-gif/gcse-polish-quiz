<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Polski GCSE App 1</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5f2ed;--sur:#fff;--s2:#ece8e2;--brd:#d5cfc8;
  --tx:#1a1714;--t2:#6b615a;--t3:#a09890;
  --acc:#c1440e;--a2:#1a5c8a;
  --grn:#1a6b3c;--gbg:#eaf5ee;--gbd:#a8d4bc;
  --red:#b83020;--rbg:#fdf0ee;--rbd:#f0b0a0;
  --wrn:#8a5800;--wbg:#fff8e8;--wbd:#f0d070;
  --r:12px;--rl:16px;--rs:8px;
  --f:-apple-system,BlinkMacSystemFont,SF Pro Display,Segoe UI,sans-serif;
  --sbi:env(safe-area-inset-bottom,0px);--sti:env(safe-area-inset-top,44px);
}
html,body{height:100%;overflow:hidden;font-family:var(--f);background:var(--bg);color:var(--tx);}
#app{height:100vh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--bg);position:relative;}
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#c1440e,#7a2506);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;padding:32px;text-align:center;transition:opacity .5s;}
#splash.hide{opacity:0;pointer-events:none;}
.sp-em{font-size:64px;margin-bottom:16px;animation:bob 1.2s ease infinite alternate;}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.sp-name{font-size:28px;font-weight:800;color:#fff;margin-bottom:10px;}
.sp-msg{font-size:16px;color:rgba(255,255,255,.9);line-height:1.6;margin-bottom:28px;}
.sp-btn{background:#fff;color:#c1440e;border:none;border-radius:14px;padding:15px 36px;font-size:17px;font-weight:800;cursor:pointer;font-family:var(--f);}
.sp-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:14px;}
.hdr{padding:var(--sti) 16px 10px;background:var(--sur);border-bottom:1px solid var(--brd);flex-shrink:0;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr-t{font-size:17px;font-weight:700;}.hdr-s{font-size:11px;color:var(--t2);margin-top:1px;}
.hdr-b{background:var(--acc);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(76px + var(--sbi));}
.bnav{position:absolute;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--brd);display:flex;padding-bottom:var(--sbi);}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 5px;border:none;background:transparent;cursor:pointer;color:var(--t3);font-family:var(--f);font-size:10px;font-weight:500;gap:2px;}
.ni.active{color:var(--acc);}.ni-ic{font-size:21px;line-height:1;}
.screen{display:none;}.screen.active{display:block;}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);padding:16px;margin-bottom:10px;}
.sec-t{font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;text-transform:uppercase;}
.bf{background:#e8f1f8;color:#1a5c8a;}.bt{background:var(--s2);color:var(--t2);}
.welcome{background:linear-gradient(135deg,#c1440e,#7a2506);color:#fff;border-radius:var(--rl);padding:18px;margin-bottom:12px;}
.wc-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.wc-av{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;}
.wc-n{font-size:20px;font-weight:800;}.wc-s{font-size:12px;opacity:.85;margin-top:2px;}
.wc-info{background:rgba(255,255,255,.15);border-radius:var(--r);padding:10px 12px;font-size:12px;line-height:1.75;}
.prog-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.prog-box{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:10px;text-align:center;}
.pv{font-size:22px;font-weight:700;color:var(--acc);}.pl{font-size:11px;color:var(--t2);margin-top:2px;}
.ob-wrap{background:var(--s2);border-radius:4px;height:8px;margin-bottom:4px;}
.ob{height:100%;border-radius:4px;background:var(--acc);transition:width .6s;}
.ob-lbl{font-size:12px;color:var(--t2);margin-bottom:14px;}
.stage-card{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;}
.stage-card:active:not(.locked){background:var(--s2);}
.stage-card.locked{cursor:default;opacity:.5;}
.stage-card.done{border-color:var(--gbd);}
.stage-card.current{border-color:var(--acc);box-shadow:0 0 0 1.5px var(--acc);}
.sr{display:flex;align-items:center;gap:12px;}
.sic{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ic-l{background:var(--s2);}.ic-o{background:var(--wbg);}.ic-d{background:var(--gbg);}
.si{flex:1;min-width:0;}.sn{font-size:15px;font-weight:700;}
.sd{font-size:12px;color:var(--t2);margin-top:2px;}
.ss{font-size:11px;font-weight:600;margin-top:4px;}
.s-lock{color:var(--t3);}.s-open{color:var(--wrn);}.s-done{color:var(--grn);}
.s-check{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:22px;}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 0;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;font-family:var(--f);margin-bottom:10px;}
.shdr{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.sh-ic{font-size:28px;}.sh-n{font-size:16px;font-weight:700;}.sh-s{font-size:12px;color:var(--t2);margin-top:2px;}
.pb-wrap{height:5px;background:var(--s2);border-radius:3px;margin-bottom:10px;}
.pb{height:100%;border-radius:3px;background:var(--acc);transition:width .4s;}
.stats-row{display:flex;gap:8px;margin-bottom:10px;}
.stat-box{flex:1;background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:8px;text-align:center;}
.sv{font-size:18px;font-weight:700;}.sl2{font-size:10px;color:var(--t2);margin-top:1px;}
.tip{background:var(--wbg);border:1px solid var(--wbd);border-radius:var(--r);padding:10px 12px;font-size:13px;color:var(--wrn);margin-bottom:12px;}
.vc-card{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--rl);padding:20px;margin-bottom:10px;text-align:center;}
.vc-topic{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--a2);margin-bottom:10px;}
.vc-en{font-size:28px;font-weight:700;color:var(--tx);margin-bottom:4px;line-height:1.2;}
.vc-hint{font-size:13px;color:var(--t3);margin-bottom:14px;}
input.vc-inp{width:100%;padding:14px;border:2px solid var(--brd);border-radius:var(--r);font-size:20px;font-family:var(--f);color:var(--tx);background:var(--bg);text-align:center;outline:none;}
input.vc-inp:focus{border-color:var(--a2);}
input.vc-inp.ok{border-color:var(--grn);background:var(--gbg);color:var(--grn);}
input.vc-inp.bad{border-color:var(--red);background:var(--rbg);}
input.vc-inp.close{border-color:var(--wrn);background:var(--wbg);}
.fb{margin-top:10px;padding:12px 14px;border-radius:var(--r);font-size:14px;line-height:1.7;text-align:left;}
.fb.ok{background:var(--gbg);color:var(--grn);border:1px solid var(--gbd);}
.fb.bad{background:var(--rbg);color:var(--red);border:1px solid var(--rbd);}
.fb.close{background:var(--wbg);color:var(--wrn);border:1px solid var(--wbd);}
.fb-title{font-weight:700;margin-bottom:5px;font-size:15px;}
.fb-row{display:flex;gap:8px;margin-bottom:4px;align-items:flex-start;}
.fb-lbl{font-size:12px;font-weight:700;min-width:24px;margin-top:2px;}
.fb-val{font-size:14px;flex:1;}
.fb-why{margin-top:7px;padding-top:7px;border-top:1px solid rgba(0,0,0,.08);font-size:13px;}
.diff-e{font-weight:800;background:rgba(184,48,32,.15);border-bottom:2px solid var(--red);border-radius:2px;}
.listen-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid var(--brd);border-radius:20px;background:var(--sur);font-size:13px;font-family:var(--f);color:var(--t2);cursor:pointer;margin-top:6px;}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn{padding:12px 18px;border:1.5px solid var(--brd);border-radius:var(--r);font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer;background:var(--sur);color:var(--tx);}
.btn:active{opacity:.8;}.btn-p{background:var(--acc);color:#fff;border-color:transparent;flex:1;}
.btn-s{color:var(--t2);}
.nav-after{display:flex;gap:8px;margin-top:10px;}
.q-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);padding:16px;margin-bottom:10px;}
.q-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.q-text{font-size:17px;font-weight:600;line-height:1.45;margin-bottom:8px;}
.q-hint{background:var(--wbg);border:1px solid var(--wbd);border-radius:var(--rs);padding:8px 12px;font-size:13px;color:var(--wrn);margin-bottom:10px;}
textarea.ans{width:100%;padding:12px;border:1.5px solid var(--brd);border-radius:var(--r);font-size:16px;font-family:var(--f);color:var(--tx);background:var(--bg);min-height:68px;resize:none;outline:none;}
textarea.ans:focus{border-color:var(--acc);}
.mc-opts{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.mc-o{padding:13px 14px;border:1.5px solid var(--brd);border-radius:var(--r);text-align:left;background:var(--sur);font-size:15px;font-family:var(--f);cursor:pointer;color:var(--tx);}
.mc-o:active:not(:disabled){background:var(--s2);}
.mc-o.correct{background:var(--gbg);color:var(--grn);border-color:var(--gbd);font-weight:600;}
.mc-o.wrong{background:var(--rbg);color:var(--red);border-color:var(--rbd);}
.mc-o:disabled{cursor:default;}
.ort-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.ort-o{padding:14px;border:1.5px solid var(--brd);border-radius:var(--r);text-align:center;background:var(--sur);font-size:20px;font-family:var(--f);font-weight:700;cursor:pointer;}
.ort-o:active:not(:disabled){background:var(--s2);}
.ort-o.correct{background:var(--gbg);color:var(--grn);border-color:var(--gbd);}
.ort-o.wrong{background:var(--rbg);color:var(--red);border-color:var(--rbd);}
.ort-o:disabled{cursor:default;}
.res-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);padding:24px;text-align:center;margin-bottom:10px;}
.res-pct{font-size:60px;font-weight:800;line-height:1;}
.res-msg{font-size:14px;color:var(--t2);margin:6px 0 16px;line-height:1.5;}
.res-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.res-pass{background:var(--gbg);border:1.5px solid var(--gbd);border-radius:var(--r);padding:14px;margin-bottom:14px;}
.res-pass h3{font-size:16px;font-weight:700;color:var(--grn);margin-bottom:4px;}
.res-fail{background:var(--wbg);border:1.5px solid var(--wbd);border-radius:var(--r);padding:14px;margin-bottom:14px;}
.res-fail h3{font-size:16px;font-weight:700;color:var(--wrn);margin-bottom:4px;}
.rp{font-size:13px;color:var(--t2);}
.tb-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.tb-l{font-size:12px;color:var(--t2);width:110px;flex-shrink:0;}
.tb-b{flex:1;height:5px;background:var(--s2);border-radius:3px;}
.tb-f{height:100%;border-radius:3px;background:var(--a2);}
.tb-p{font-size:12px;color:var(--t2);width:32px;text-align:right;}
.ort-ref-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);padding:16px;margin-bottom:10px;}
.ort-ltr{font-size:40px;font-weight:800;color:var(--acc);text-align:center;margin-bottom:2px;}
.ort-nm{font-size:12px;font-weight:700;color:var(--t2);text-align:center;margin-bottom:8px;}
.ort-rule{font-size:14px;line-height:1.7;margin-bottom:8px;}
.ort-exs{display:flex;flex-wrap:wrap;gap:6px;}
.ort-ex{background:var(--s2);border-radius:var(--rs);padding:4px 10px;font-size:13px;font-weight:600;}
.ort-hl{color:var(--acc);font-weight:800;}
.gram-sec{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;}
.gram-hdr{padding:14px 16px;display:flex;justify-content:space-between;cursor:pointer;}
.gram-t{font-size:15px;font-weight:600;}.gram-tog{font-size:18px;color:var(--t3);}
.gram-body{padding:0 16px 16px;display:none;border-top:1px solid var(--brd);}
.gram-body.open{display:block;}
.rt{font-size:12px;font-weight:700;color:var(--acc);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.3px;}
.tw{overflow-x:auto;margin-top:6px;}
table{border-collapse:collapse;width:100%;font-size:13px;}
th{background:var(--s2);padding:7px 9px;text-align:left;font-weight:700;border:1px solid var(--brd);}
td{padding:7px 9px;border:1px solid var(--brd);}
td:first-child{font-weight:600;color:var(--a2);}
.eg{background:#e8f1f8;border-radius:var(--rs);padding:10px 12px;margin-top:8px;font-size:13px;line-height:1.7;}
.eg-pl{font-weight:600;color:var(--a2);}.eg-en{color:var(--t2);}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:200;}
.modal-ov.open{display:flex;}
.modal-sh{background:var(--sur);border-radius:24px 24px 0 0;padding:28px 24px calc(28px + var(--sbi));width:100%;text-align:center;animation:sup .3s ease;}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.m-ic{font-size:56px;margin-bottom:12px;}.m-tit{font-size:22px;font-weight:800;margin-bottom:6px;}
.m-sub{font-size:14px;color:var(--t2);margin-bottom:20px;line-height:1.5;}
.m-btn{width:100%;padding:15px;border:none;border-radius:var(--r);font-family:var(--f);font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;}
.m-btn.p{background:var(--grn);color:#fff;}.m-btn.s{background:var(--s2);color:var(--tx);}
.hidden{display:none!important;}
</style>
</head>

function chkMC(btn,chosen,correct){
  if(qAns)return;qAns=true;

function subQ(){
  if(qAns)return;

    <div class="fb-row"><span class="fb-lbl">‚ĚĆ</span><span class="fb-val">NapisaŇāaŇõ: <em>${user}</em></span></div>

    ${q.why?`<div class="fb-why">ūüí° Dlaczego: ${q.why}</div>`:""}

}

// ‚ĒÄ‚ĒÄ UTILS ‚ĒÄ‚ĒÄ
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function nrm(s){return(s||"").trim().toLowerCase().replace(/[.!?,;:]/g,"");}
function esc(s){return(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;");}
function lev(a,b){const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>[i]);for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);return dp[m][n];}
function dHL(u,c){let h="",ci=0,ui=0;const cs=c.trim(),us=u.trim();while(ci<cs.length||ui<us.length){if(ci<cs.length&&ui<us.length&&cs[ci].toLowerCase()===us[ui].toLowerCase()){h+=cs[ci];ci++;ui++;}else{h+=`<span class="diff-e">${cs[ci]||""}</span>`;ci++;if(ui<us.length)ui++;}}return h;}
function recS(obj,k,ok){if(!obj[k])obj[k]={c:0,t:0};obj[k].t++;if(ok)obj[k].c++;}
function spk(text,lang){if(!text||!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=lang||"pl-PL";u.rate=0.82;const voices=window.speechSynthesis.getVoices();const v=voices.find(v=>v.lang.startsWith(lang&&lang.startsWith("en")?"en":"pl"));if(v)u.voice=v;window.speechSynthesis.speak(u);}

// ‚ĒÄ‚ĒÄ INIT ‚ĒÄ‚ĒÄ
renderMap();
if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>{};}
